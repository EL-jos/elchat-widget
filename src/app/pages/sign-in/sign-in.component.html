<div class="el-screen el-sign-up">
    <!-- <button type="button" class="el-btn-back">
        <img src="../../../assets/svg/arrow-left-1-svgrepo-com.svg" alt="">
    </button> -->
    <h1>Se connecter</h1>
    <legend>
        Accédez à votre assistant et retrouvez l’historique de vos échanges.
        Une connexion est nécessaire pour garantir la sécurité et la continuité de vos conversations.
    </legend>
    <button class="el-sin-up-with" (click)="signInWithGoogle()">
        <img src="../../../assets/svg/google-icon.svg" alt="">
        <span>Sign In with Google</span>
    </button>
    <!-- <button class="el-sin-up-with" (click)="signInWithFacebook()">
        <img src="../../../assets/svg/facebook-icon.svg" alt="">
        <span>Sign In with Facebook</span>
    </button>
    <div class="el-container-divider">
        <div class="el-line"></div>
        <span>or</span>
        <div class="el-line"></div>
    </div> -->
    <div *ngIf="loading" class="global-spinner">
        <app-spinner></app-spinner> <!-- composant spinner réutilisable -->
    </div>
    <form #signInFormGroup="ngForm" (ngSubmit)="onSubmit(signInFormGroup)" class="el-form">
        <div class="el-form-group">
            <input type="email" id="email" required name="email" [ngModel]>
            <label for="email">Adresse électronique</label>
        </div>
        <div class="el-form-group">
            <input [type]="showPassword ? 'text' : 'password'"  id="password" required name="password" [ngModel]>
            <label for="password">Mot de passe</label>
            <button *ngIf="!showPassword" type="button" class="el-btn-show-password" (click)="togglePassword()">
                <img src="../../../assets/svg/eye-svgrepo-com.svg" alt="">
            </button>
            <button *ngIf="showPassword" type="button" class="el-btn-mask-password" (click)="togglePassword()">
                <img src="../../../assets/svg/eye-off-svgrepo-com.svg" alt="">
            </button>
        </div>
        <button type="submit" class="el-btn-primary el-btn-block">Se connecter</button>
    </form>
    <p class="el-text-footer">Vous n'avez pas encore de compte ? <a routerLink="/sign-up">S'inscrire</a></p>
</div>
