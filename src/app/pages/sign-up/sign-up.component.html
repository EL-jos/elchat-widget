<div class="el-screen el-sign-up">
    <!-- <button type="button" class="el-btn-back">
        <img src="../../../assets/svg/arrow-left-1-svgrepo-com.svg" alt="">
    </button> -->
    <h1>S'inscrire</h1>
    <legend>
        Créez votre compte pour interagir avec notre assistant et conserver l’historique de vos échanges.
        Une inscription est nécessaire pour garantir la sécurité et la continuité de vos conversations.
    </legend>
    <button class="el-sin-up-with" (click)="signUpWithGoogle()" *ngIf="showGoogleButton">
        <img src="../../../assets/svg/google-icon.svg" alt="">
        <span>Sign Up with Google</span>
    </button>
    <!-- <button class="el-sin-up-with" (click)="signUpWithFacebook()">
        <img src="../../../assets/svg/facebook-icon.svg" alt="">
        <span>Sign Up with Facebook</span>
    </button>
    <div class="el-container-divider">
        <div class="el-line"></div>
        <span>or</span>
        <div class="el-line"></div>
    </div> -->
    <div *ngIf="loading" class="global-spinner">
        <app-spinner></app-spinner> <!-- composant spinner réutilisable -->
    </div>
    <form #signUpFormGroup="ngForm" (ngSubmit)="onSubmit(signUpFormGroup)" class="el-form">
        <div class="el-form-group">
            <input type="text" id="firstname" required name="firstname" [ngModel]>
            <label for="firstname">Prénom</label>
        </div>
        <div class="el-form-group">
            <input type="text" id="lastname" required name="lastname" [ngModel]>
            <label for="lastname">Nom de famille</label>
        </div>
        <div class="el-form-group">
            <input type="email" id="email" required name="email" [ngModel]>
            <label for="email">Adresse électronique</label>
        </div>
        <div class="el-form-group">
            <input type="tel" id="phone" required name="phone" [ngModel]>
            <label for="phone">Téléphone</label>
        </div>
        <div class="el-form-group">
            <input [type]="showPassword ? 'text' : 'password'"  id="password" required name="password" [ngModel]>
            <label for="password">Mot de passe</label>
            <button *ngIf="!showPassword" type="button" class="el-btn-show-password" (click)="togglePassword()">
                <img src="../../../assets/svg/eye-svgrepo-com.svg" alt="">
            </button>
            <button *ngIf="showPassword" type="button" class="el-btn-mask-password" (click)="togglePassword()">
                <img src="../../../assets/svg/eye-off-svgrepo-com.svg" alt="">
            </button>
        </div>
        <div class="el-form-group">
            <input [type]="showPasswordConfirm ? 'text' : 'password'" id="password_confirmation" required name="password_confirmation" [ngModel]>
            <label for="password_confirmation">Confirmez le mot de passe</label>
            <button *ngIf="!showPasswordConfirm" type="button" class="el-btn-show-password" (click)="togglePasswordConfirm()">
                <img src="../../../assets/svg/eye-svgrepo-com.svg" alt="">
            </button>
            <button *ngIf="showPasswordConfirm" type="button" class="el-btn-mask-password" (click)="togglePasswordConfirm()">
                <img src="../../../assets/svg/eye-off-svgrepo-com.svg" alt="">
            </button>
        </div>
        <button type="submit" class="el-btn-primary el-btn-block">S'inscrire</button>
    </form>
    <p class="el-text-footer">Vous avez déjà un compte ? <a routerLink="/sign-in">Se connecter</a></p>
</div>
